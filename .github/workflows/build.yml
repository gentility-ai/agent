name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            nfpm_config: nfpm.yaml
            nfpm_arch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            nfpm_config: nfpm-arm64.yaml
            nfpm_arch: arm64

    runs-on: ${{ matrix.runner }}
    name: Linux ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libevent-dev \
            libssl-dev \
            libgc-dev \
            libpcre2-dev \
            libxml2-dev \
            libyaml-dev \
            zlib1g-dev

      - name: Install Crystal dependencies
        run: shards install --production

      - name: Build static binary
        run: |
          mkdir -p bin
          crystal build src/agent.cr \
            --release \
            --static \
            --no-debug \
            -o bin/gentility-agent

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build DEB package
        run: |
          mkdir -p packages
          nfpm pkg \
            --packager deb \
            --config ${{ matrix.nfpm_config }} \
            --target packages/gentility-agent_${{ steps.version.outputs.version }}_${{ matrix.nfpm_arch }}.deb

      - name: Build RPM package
        run: |
          nfpm pkg \
            --packager rpm \
            --config ${{ matrix.nfpm_config }} \
            --target packages/gentility-agent-${{ steps.version.outputs.version }}.${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }}.rpm

      - name: Create tarball
        run: |
          tar -czf packages/gentility-agent-${{ steps.version.outputs.version }}-linux-${{ matrix.arch }}.tar.gz \
            -C bin gentility-agent

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: packages/*

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13

    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install Crystal dependencies
        run: shards install --production

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build binary
        run: |
          mkdir -p bin
          crystal build src/agent.cr \
            --release \
            --no-debug \
            -o bin/gentility-agent-${{ steps.version.outputs.version }}-darwin-${{ matrix.arch }}

      - name: Create tarball
        run: |
          mkdir -p packages
          tar -czf packages/gentility-agent-${{ steps.version.outputs.version }}-darwin-${{ matrix.arch }}.tar.gz \
            -C bin gentility-agent-${{ steps.version.outputs.version }}-darwin-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: packages/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
